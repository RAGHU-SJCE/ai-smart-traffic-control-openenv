spec_version: 1

name: ai-smart-control-system

type: space
runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - name: easy
    description: Low traffic scenario with minimal congestion
    success_criteria: Maintain total queue below 15

  - name: medium
    description: Moderate traffic with occasional imbalance
    success_criteria: Maintain total queue below 20

  - name: hard
    description: Heavy congestion with emergency vehicles
    success_criteria: Reduce congestion while handling emergencies